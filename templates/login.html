<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-shell">
        <div class="login-card">
            <div class="brand-mark login-brand">CI</div>
            <p class="eyebrow">Restricted Access</p>
            <h1>Crime Intelligence Control System</h1>
            <p class="muted">Authorized personnel only. Enter your credentials to access the operational dashboard.</p>

            {% if error_message %}
                <div class="login-error">{{ error_message }}</div>
            {% endif %}

            <form action="{{ url_for('login', next=request.args.get('next', '')) }}" method="POST" class="login-form">
                <label>Username<input type="text" name="username" required></label>
                <label>Password<input type="password" name="password" required></label>
                <button type="submit" class="primary-button login-button">Login</button>
            </form>

            <p class="muted login-hint">Default credentials for local demo: <strong>admin</strong> / <strong>police123</strong></p>
        </div>
    </div>
</body>
</html>
